<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Brand Appliance Repair Central NJ | Sub-Zero, Viking, Wolf Repair</title>
    <meta name="description"
        content="Certified luxury brand appliance repair in Central New Jersey. Expert service for Sub-Zero, Viking, Wolf, Thermador, and Bosch. Professional master technicians serving NJ.">

    <!-- Scripts & Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.359.0/dist/umd/lucide.min.js"></script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700&family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --brand-blue: #0A2647;
            --brand-accent: #E8AA42;
            --brand-ivory: #FDFDFD;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--brand-ivory);
            color: #1F2937;
        }

        .font-brand {
            font-family: 'Unbounded', sans-serif;
        }

        .bg-brand-blue {
            background-color: var(--brand-blue);
        }

        .text-brand-blue {
            color: var(--brand-blue);
        }

        .bg-brand-accent {
            background-color: var(--brand-accent);
        }

        .text-brand-accent {
            color: var(--brand-accent);
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .luxury-hero {
            background: linear-gradient(rgba(10, 38, 71, 0.9), rgba(10, 38, 71, 0.9)), url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const luxuryBrands = [
                { name: "Sub-Zero", focus: "Refrigeration Specialists" },
                { name: "Viking", focus: "Range & Cooking Mastery" },
                { name: "Wolf", focus: "Precision Cooking Systems" },
                { name: "Thermador", focus: "Integrated Kitchen Tech" },
                { name: "Bosch", focus: "German Engineering Experts" },
                { name: "JennAir", focus: "Luxury Performance Service" },
                { name: "Miele", focus: "High-End System Care" },
                { name: "Dacor", focus: "Modern Luxury Repair" }
            ];

            return (
                <div className="min-h-screen">
                    {/* TOP BAR */}
                    <div className="bg-brand-accent text-white py-2 text-[10px] uppercase tracking-[0.2em] font-bold text-center px-4">
                        Master Technician Certified for Luxury Systems
                    </div>

                    {/* HEADER */}
                    <header className={`sticky top-0 z-50 transition-all ${scrolled ? 'glass-header py-3 shadow-md' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
                            <div className="flex items-center space-x-4">
                                <a href="index.html" className="block text-white font-bold flex items-center space-x-2 bg-brand-blue/20 backdrop-blur-md px-4 py-2 rounded-full">
                                    <i data-lucide="chevron-left" className="w-4 h-4"></i>
                                    <span>BACK TO HOME</span>
                                </a>
                            </div>

                            <nav className="hidden lg:flex items-center space-x-8 text-[11px] font-bold uppercase tracking-widest text-brand-blue">
                                <a href="tel:9145632299" className="bg-brand-accent text-white px-6 py-2.5 rounded-full transition-all flex items-center shadow-lg hover:bg-brand-blue">
                                    <i data-lucide="phone" className="w-3.5 h-3.5 mr-2"></i>
                                    914-563-2299
                                </a>
                            </nav>
                        </div>
                    </header>

                    {/* HERO */}
                    <section className="luxury-hero pt-32 pb-40 px-4 text-white">
                        <div className="max-w-4xl mx-auto text-center">
                            <div className="uppercase tracking-[0.3em] text-brand-accent font-bold text-xs mb-6">Platinum Service Tier</div>
                            <h2 className="font-brand text-4xl md:text-6xl font-bold tracking-tight mb-8 leading-[1.1]">
                                Elite Repair for <span className="text-brand-accent">Elite Brands</span>
                            </h2>
                            <p className="text-blue-100 text-lg md:text-xl max-w-2xl mx-auto mb-12 leading-relaxed font-light">
                                High-performance appliances require high-precision care. Our master technicians specialize in the complex systems of Viking, Sub-Zero, and more.
                            </p>
                            <a href="tel:9145632299" className="bg-brand-accent text-white px-12 py-6 rounded-2xl font-bold text-lg hover:bg-white hover:text-brand-blue transition-all shadow-2xl inline-flex items-center">
                                <i data-lucide="shield-check" className="w-6 h-6 mr-3"></i>
                                Schedule Master Technician
                            </a>
                        </div>
                    </section>

                    {/* BRAND GRID */}
                    <section className="py-24 bg-white px-4 relative -mt-20 z-10">
                        <div className="max-w-7xl mx-auto grid grid-cols-2 lg:grid-cols-4 gap-6">
                            {luxuryBrands.map((brand, i) => (
                                <div key={i} className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 flex flex-col items-center text-center group hover:border-brand-accent transition-colors">
                                    <h3 className="font-brand text-xl text-brand-blue font-bold mb-2 group-hover:text-brand-accent">{brand.name}</h3>
                                    <p className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">{brand.focus}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* WHY LUXURY */}
                    <section className="py-24 bg-gray-50 px-4">
                        <div className="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center">
                            <div>
                                <h3 className="font-brand text-3xl text-brand-blue font-bold mb-8 italic">Precision Matters.</h3>
                                <p className="text-gray-500 text-lg mb-8 leading-relaxed">
                                    Luxury appliances are built with proprietary technology and complex electronic controls. Standard "jack-of-all-trades" repair companies often lack the specific diagnostic tools and factory parts needed for these machines.
                                </p>
                                <ul className="space-y-6">
                                    <li className="flex items-start space-x-4">
                                        <div className="w-10 h-10 bg-brand-blue rounded-full flex items-center justify-center text-brand-accent flex-shrink-0">
                                            <i data-lucide="settings" className="w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-brand-blue">OEM Factory Parts Only</h4>
                                            <p className="text-sm text-gray-500">We never use generic parts that could compromise your system's performance.</p>
                                        </div>
                                    </li>
                                    <li className="flex items-start space-x-4">
                                        <div className="w-10 h-10 bg-brand-blue rounded-full flex items-center justify-center text-brand-accent flex-shrink-0">
                                            <i data-lucide="cpu" className="w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-brand-blue">Advanced Diagnostics</h4>
                                            <p className="text-sm text-gray-500">We use brand-specific diagnostic interfaces to pinpoint issues precisely.</p>
                                        </div>
                                    </li>
                                    <li className="flex items-start space-x-4">
                                        <div className="w-10 h-10 bg-brand-blue rounded-full flex items-center justify-center text-brand-accent flex-shrink-0">
                                            <i data-lucide="award" className="w-5 h-5"></i>
                                        </div>
                                        <div>
                                            <h4 className="font-bold text-brand-blue">Warranty Protection</h4>
                                            <p className="text-sm text-gray-500">Professional service that keeps your manufacturer warranty intact.</p>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                            <div className="relative">
                                <div className="absolute -inset-4 bg-brand-accent/5 rounded-3xl blur-2xl"></div>
                                <div className="relative bg-brand-blue rounded-3xl p-12 text-white">
                                    <h4 className="font-brand text-2xl font-bold mb-6">Luxury Service Area</h4>
                                    <p className="text-blue-100 mb-8 font-light">We provide priority scheduling for luxury brand service across Princeton, Basking Ridge, Far Hills, and Hillsborough.</p>
                                    <div className="flex items-center space-x-4 p-4 bg-white/5 rounded-xl border border-white/10">
                                        <i data-lucide="map-pin" className="w-6 h-6 text-brand-accent"></i>
                                        <div>
                                            <p className="font-bold">Fast Local Dispatch</p>
                                            <p className="text-xs text-blue-200">Somerset & Hunterdon Counties</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CTA */}
                    <section className="py-24 bg-white text-center px-4 border-t border-gray-100">
                        <h3 className="font-brand text-3xl text-brand-blue font-bold mb-8">Schedule Your Master Technician</h3>
                        <p className="text-gray-500 mb-12 max-w-xl mx-auto text-lg font-light">Immediate attention for Viking, Sub-Zero, Wolf and other luxury brands.</p>
                        <div className="flex flex-col sm:flex-row justify-center gap-6">
                            <a href="tel:9145632299" className="bg-brand-blue text-white px-10 py-5 rounded-2xl font-bold text-lg hover:bg-brand-accent transition-all shadow-xl">
                                Call 914-563-2299
                            </a>
                            <a href="sms:9145632299" className="bg-brand-accent text-white px-10 py-5 rounded-2xl font-bold text-lg hover:bg-brand-blue transition-all shadow-xl">
                                Text Private Line
                            </a>
                        </div>
                    </section>

                    {/* FOOTER SAME AS INDEX */}
                    <footer className="bg-gray-50 border-t border-gray-200 pt-24 pb-12 px-4 text-center">
                        <p className="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-4">© 2026 Appliance Repair 101. Luxury Service Division.</p>
                        <a href="index.html" className="text-[10px] uppercase tracking-widest text-brand-blue font-bold hover:text-brand-accent transition-colors">Back to Main Site</a>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        window.addEventListener('load', () => {
            if (window.lucide) window.lucide.createIcons();
        });
        setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 1000);
    </script>
</body>

</html>
