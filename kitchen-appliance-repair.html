<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Appliance Repair Central NJ | Fridge, Oven, Dishwasher Repair</title>
    <meta name="description"
        content="Expert kitchen appliance repair in Central New Jersey. We fix refrigerators, ovens, stoves, and dishwashers. Same-day service in Hillsborough, Princeton, and surrounding areas.">

    <!-- Scripts & Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.359.0/dist/umd/lucide.min.js"></script>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700&family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --brand-blue: #0A2647;
            --brand-accent: #E8AA42;
            --brand-ivory: #FDFDFD;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--brand-ivory);
            color: #1F2937;
        }

        .font-brand {
            font-family: 'Unbounded', sans-serif;
        }

        .bg-brand-blue {
            background-color: var(--brand-blue);
        }

        .text-brand-blue {
            color: var(--brand-blue);
        }

        .bg-brand-accent {
            background-color: var(--brand-accent);
        }

        .text-brand-accent {
            color: var(--brand-accent);
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(232, 170, 66, 0.05), transparent),
                linear-gradient(to bottom right, #ffffff, #f3f4f6);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const appliances = [
                { name: "Refrigerators", issues: ["Not cooling", "Ice maker broken", "Leaking water", "Constant cycling"] },
                { name: "Ovens & Stoves", issues: ["Not heating", "Igniter clicking", "Uneven baking", "Glass top repair"] },
                { name: "Dishwashers", issues: ["Not cleaning well", "Water pooling", "Not starting", "Loud during cycle"] },
                { name: "Freezers", issues: ["Frost buildup", "Warm interior", "Strange noises", "Door seal issues"] }
            ];

            return (
                <div className="min-h-screen">
                    {/* TOP BAR */}
                    <div className="bg-brand-blue text-white py-2 text-[10px] uppercase tracking-[0.2em] font-bold text-center px-4">
                        Kitchen Appliance Repair Specialists • Central New Jersey
                    </div>

                    {/* HEADER */}
                    <header className={`sticky top-0 z-50 transition-all ${scrolled ? 'glass-header py-3 shadow-md' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
                            <div className="flex items-center space-x-4">
                                <a href="index.html" className="block text-brand-blue font-bold flex items-center space-x-2">
                                    <i data-lucide="chevron-left" className="w-4 h-4"></i>
                                    <span>BACK TO HOME</span>
                                </a>
                            </div>

                            <nav className="hidden lg:flex items-center space-x-8 text-[11px] font-bold uppercase tracking-widest text-brand-blue">
                                <a href="tel:9145632299" className="bg-brand-accent hover:bg-brand-blue hover:text-white px-6 py-2.5 rounded-full transition-all flex items-center shadow-lg hover:shadow-brand-accent/20">
                                    <i data-lucide="phone" className="w-3.5 h-3.5 mr-2"></i>
                                    914-563-2299
                                </a>
                            </nav>
                        </div>
                    </header>

                    {/* HERO */}
                    <section className="hero-gradient pt-20 pb-24 px-4 border-b border-gray-100">
                        <div className="max-w-4xl mx-auto text-center">
                            <h2 className="font-brand text-4xl md:text-5xl text-brand-blue font-bold tracking-tight mb-8 leading-[1.1]">
                                Kitchen Appliance <span className="text-brand-accent">Repair Mastery</span>
                            </h2>
                            <p className="text-gray-600 text-lg md:text-xl max-w-2xl mx-auto mb-10 leading-relaxed font-light">
                                From cold fridges to hot ovens, we keep your kitchen running. Expert repair for all major brands in Central NJ.
                            </p>
                            <a href="tel:9145632299" className="bg-brand-blue text-white px-10 py-5 rounded-2xl font-bold text-lg hover:bg-brand-accent transition-all shadow-xl inline-flex items-center">
                                <i data-lucide="phone-call" className="w-5 h-5 mr-3"></i>
                                Request Same-Day Repair
                            </a>
                        </div>
                    </section>

                    {/* APPLIANCE CARDS */}
                    <section className="py-24 bg-white px-4">
                        <div className="max-w-7xl mx-auto">
                            <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {appliances.map((app, i) => (
                                    <div key={i} className="bg-gray-50 p-8 rounded-3xl border border-gray-100 hover:shadow-xl transition-all group">
                                        <h3 className="font-brand text-xl text-brand-blue font-bold mb-6 group-hover:text-brand-accent">{app.name}</h3>
                                        <ul className="space-y-3">
                                            {app.issues.map((issue, j) => (
                                                <li key={j} className="text-sm font-semibold text-gray-500 flex items-center space-x-2">
                                                    <i data-lucide="alert-circle" className="w-4 h-4 text-brand-accent opacity-50"></i>
                                                    <span>{issue}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* KITCHEN SPECIFIC COPY */}
                    <section className="py-24 bg-gray-50 border-t border-gray-100 px-4">
                        <div className="max-w-4xl mx-auto text-center">
                            <h3 className="font-brand text-3xl text-brand-blue font-bold mb-8 italic">"We know how much a broken fridge disrupts your family."</h3>
                            <p className="text-gray-500 text-lg leading-relaxed mb-12">
                                That's why we prioritize refrigerator and kitchen repairs. Our trucks are mobile warehouses, carrying the most common sensors, heating elements, and water valves to get your kitchen back to normal within hours, not days.
                            </p>
                            <div className="bg-white p-8 rounded-2xl border border-gray-200 inline-block text-left shadow-sm">
                                <p className="text-brand-blue font-bold uppercase tracking-widest text-xs mb-4">Certified to Repair</p>
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-6">
                                    <span className="font-brand text-sm">VIKING</span>
                                    <span className="font-brand text-sm">SUB-ZERO</span>
                                    <span className="font-brand text-sm">WOLF</span>
                                    <span className="font-brand text-sm">THERMADOR</span>
                                    <span className="font-brand text-sm">JENNAIR</span>
                                    <span className="font-brand text-sm">MIELE</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* CTA */}
                    <section className="py-24 bg-brand-blue text-white text-center px-4">
                        <h3 className="font-brand text-3xl font-bold mb-8">Fast Kitchen Repairs are One Call Away</h3>
                        <p className="text-blue-200 mb-12 max-w-xl mx-auto text-lg font-light">Available for same-day service across Hillsborough, Princeton, and surrounding Central NJ towns.</p>
                        <div className="flex flex-col sm:flex-row justify-center gap-6">
                            <a href="tel:9145632299" className="bg-brand-accent text-white px-10 py-5 rounded-2xl font-bold text-lg hover:scale-105 transition-all shadow-xl">
                                Call 914-563-2299
                            </a>
                            <a href="sms:9145632299" className="bg-white text-brand-blue px-10 py-5 rounded-2xl font-bold text-lg hover:scale-105 transition-all shadow-xl">
                                Text for Help
                            </a>
                        </div>
                    </section>

                    {/* FOOTER SAME AS INDEX */}
                    <footer className="bg-white border-t border-gray-100 pt-24 pb-12 px-4">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
                            <p className="text-[10px] uppercase tracking-widest text-gray-400 font-bold">© 2026 Appliance Repair 101. All rights reserved.</p>
                            <a href="index.html" className="text-[10px] uppercase tracking-widest text-brand-blue font-bold hover:text-brand-accent transition-colors">Back to Homepage</a>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        window.addEventListener('load', () => {
            if (window.lucide) window.lucide.createIcons();
        });
        setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 1000);
    </script>
</body>

</html>
